name: Deploy blocksy-child → Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'blocksy-child/**'

jobs:
  deploy:
    name: Rsync + purge cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Créer le dossier distant si absent
        run: |
          ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /home/${{ secrets.SSH_USER }}/public_html/wp-content/themes/blocksy-child"

      - name: Déployer via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            blocksy-child/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/public_html/wp-content/themes/blocksy-child/

      - name: Purger le cache LiteSpeed
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://rigolettres.fr/wp-json/litespeed/v1/purge/all" \
            -H "Authorization: Basic $(echo -n '${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASS }}' | base64)"
